<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Workout Tracker</title>
  <style>
    :root {
      --bg: #111111;
      --surface: #1c1c1e;
      --surface2: #2c2c2e;
      --accent: #ff6b35;
      --accent-dim: rgba(255, 107, 53, 0.12);
      --text: #f5f5f5;
      --text-muted: #8e8e93;
      --border: #2c2c2e;
      --green: #30d158;
      --radius: 14px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
    }

    /* ── HEADER ── */
    .app-header {
      background: #111;
      border-bottom: 1px solid var(--border);
      padding: 18px 24px 0;
      position: sticky;
      top: 0;
      z-index: 200;
      backdrop-filter: blur(20px);
    }

    .app-title {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 14px;
    }

    /* ── TABS ── */
    .tabs {
      display: flex;
      gap: 0;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .tabs::-webkit-scrollbar { display: none; }

    .tab {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 14px;
      font-weight: 600;
      padding: 10px 20px 12px;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      white-space: nowrap;
      transition: color .15s, border-color .15s;
    }
    .tab:hover { color: var(--text); }
    .tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    /* ── PAGES ── */
    .page { display: none; padding: 32px 20px; max-width: 1100px; margin: 0 auto; }
    .page.active { display: block; }

    .page-title {
      font-size: 26px;
      font-weight: 700;
      margin-bottom: 28px;
    }

    /* ── EXERCISE CARD ── */
    .exercise-card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 22px;
      margin-bottom: 20px;
      border: 1px solid var(--border);
    }

    .exercise-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 16px;
      gap: 12px;
    }

    .exercise-card.collapsed .exercise-top {
      margin-bottom: 0;
    }

    .exercise-card.collapsed .exercise-body {
      display: none;
    }

    .collapse-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 18px;
      padding: 0 0 0 8px;
      line-height: 1;
      flex-shrink: 0;
      transition: transform 0.2s;
    }

    .exercise-card.collapsed .collapse-btn {
      transform: rotate(-90deg);
    }

    .exercise-name {
      font-size: 17px;
      font-weight: 700;
    }

    .exercise-sets {
      background: var(--accent-dim);
      color: var(--accent);
      font-size: 12px;
      font-weight: 700;
      padding: 5px 12px;
      border-radius: 20px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* ── IMAGE GRID ── */
    .img-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 18px;
    }

    @media (max-width: 640px) {
      .img-grid { grid-template-columns: repeat(2, 1fr); }
    }

    .img-cell {
      aspect-ratio: 4/3;
      border-radius: 10px;
      overflow: hidden;
      background: var(--surface2);
      position: relative;
    }

    .img-cell img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: opacity .3s;
    }

    .img-cell .img-fallback {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      background: var(--surface2);
    }

    /* ── TIPS ── */
    .tips-label {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 10px;
    }

    .tips-list {
      list-style: none;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .tips-list li {
      background: var(--surface2);
      border-radius: 8px;
      padding: 6px 12px;
      font-size: 13px;
      color: #ccc;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .tips-list li::before {
      content: '';
      width: 6px;
      height: 6px;
      background: var(--accent);
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ── DIARY ── */
    .diary-day {
      margin-bottom: 36px;
    }

    .diary-day-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .diary-day-title {
      font-size: 18px;
      font-weight: 700;
    }

    .diary-day-sub {
      font-size: 13px;
      color: var(--text-muted);
    }

    .table-card {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      overflow: hidden;
    }

    .table-scroll { overflow-x: auto; }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 520px;
    }

    thead th {
      background: var(--surface2);
      padding: 11px 14px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .05em;
      text-transform: uppercase;
      color: var(--text-muted);
      text-align: center;
      white-space: nowrap;
    }

    thead th:first-child { text-align: left; min-width: 190px; }

    tbody tr { border-top: 1px solid var(--border); }
    tbody tr:hover { background: rgba(255,255,255,.03); }

    tbody td {
      padding: 10px 14px;
      font-size: 14px;
      text-align: center;
      vertical-align: middle;
    }

    tbody td:first-child { text-align: left; }

    .ex-cell-name { font-weight: 600; font-size: 14px; }
    .ex-cell-sets { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

    .week-input {
      background: var(--surface2);
      border: 1.5px solid transparent;
      border-radius: 8px;
      color: var(--text);
      padding: 6px 8px;
      width: 76px;
      text-align: center;
      font-size: 14px;
      font-weight: 600;
      transition: border-color .15s;
    }

    .week-input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .week-input::placeholder { color: var(--text-muted); font-weight: 400; }

    .week-input.has-value { color: var(--green); }

    /* ── WEEK HEADER EDIT ── */
    .week-th {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .week-th input {
      background: transparent;
      border: none;
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .05em;
      text-transform: uppercase;
      text-align: center;
      width: 90px;
      cursor: pointer;
    }

    .week-th input:focus {
      outline: none;
      color: var(--accent);
    }

    .week-th .remove-week {
      background: none;
      border: none;
      color: #555;
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
      padding: 0;
      display: none;
    }

    .week-th:hover .remove-week { display: block; }

    /* ── ACTIONS BAR ── */
    .actions-bar {
      display: flex;
      gap: 10px;
      margin-top: 16px;
      flex-wrap: wrap;
    }

    .btn {
      border: none;
      border-radius: 10px;
      padding: 10px 18px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s, transform .1s;
    }

    .btn:active { transform: scale(.97); }
    .btn-primary { background: var(--accent); color: white; }
    .btn-secondary { background: var(--surface2); color: var(--text-muted); }
    .btn:hover { opacity: .88; }

    /* ── STATS BAR ── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 28px;
    }

    @media (max-width: 480px) {
      .stats-row { grid-template-columns: 1fr; }
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
    }

    .stat-value {
      font-size: 28px;
      font-weight: 700;
      color: var(--accent);
    }

    .stat-label {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    /* ── PROGRESS INDICATOR ── */
    .progress-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--surface2);
      display: inline-block;
    }

    .progress-dot.filled { background: var(--green); }

    /* ── INLINE WEIGHTS ── */
    .inline-weights {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }

    .inline-weights-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .inline-denik-link {
      background: none;
      border: none;
      color: var(--accent);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      padding: 0;
      opacity: .8;
      transition: opacity .15s;
    }
    .inline-denik-link:hover { opacity: 1; }

    .inline-weeks-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .inline-week {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .inline-week-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .05em;
      text-transform: uppercase;
      color: var(--text-muted);
      white-space: nowrap;
    }

    /* ── EMPTY STATE ── */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }

    .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
    .empty-state p { font-size: 15px; }

    /* ── KALORIE ── */
    .kal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      gap: 12px;
    }
    .kal-week-nav {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .kal-week-nav button {
      background: var(--surface2);
      border: none;
      color: var(--text);
      border-radius: 8px;
      padding: 6px 12px;
      cursor: pointer;
      font-size: 16px;
    }
    .kal-week-label {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-muted);
      min-width: 120px;
      text-align: center;
    }
    .kal-goal-row {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface);
      border-radius: var(--radius);
      padding: 14px 18px;
      margin-bottom: 20px;
      border: 1px solid var(--border);
    }
    .kal-goal-label {
      font-size: 13px;
      color: var(--text-muted);
      flex: 1;
    }
    .kal-goal-input {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 15px;
      font-weight: 700;
      padding: 6px 10px;
      width: 90px;
      text-align: center;
    }
    .kal-goal-unit {
      font-size: 13px;
      color: var(--text-muted);
    }
    .kal-day-card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 18px;
      margin-bottom: 14px;
      border: 1px solid var(--border);
    }
    .kal-day-card.today {
      border-color: var(--accent);
    }
    .kal-day-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .kal-day-name {
      font-size: 15px;
      font-weight: 700;
    }
    .kal-day-date {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
    }
    .kal-day-total {
      font-size: 20px;
      font-weight: 800;
      color: var(--accent);
    }
    .kal-day-total.over {
      color: #ff453a;
    }
    .kal-day-total.ok {
      color: var(--green);
    }
    .kal-progress {
      height: 6px;
      background: var(--surface2);
      border-radius: 3px;
      margin-bottom: 14px;
      overflow: hidden;
    }
    .kal-progress-bar {
      height: 100%;
      border-radius: 3px;
      background: var(--accent);
      transition: width 0.3s;
    }
    .kal-progress-bar.ok { background: var(--green); }
    .kal-progress-bar.over { background: #ff453a; }
    .kal-meals {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }
    @media (max-width: 480px) {
      .kal-meals { grid-template-columns: 1fr 1fr; }
    }
    .kal-meal {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .kal-meal-label {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: .06em;
    }
    .kal-meal-input {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 15px;
      padding: 8px 10px;
      width: 100%;
      text-align: center;
    }
    .kal-meal-input:focus {
      outline: none;
      border-color: var(--accent);
    }
    .kal-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 20px;
    }
    .kal-stat {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 16px;
      text-align: center;
      border: 1px solid var(--border);
    }
    .kal-stat-value {
      font-size: 22px;
      font-weight: 800;
      color: var(--accent);
    }
    .kal-stat-label {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 4px;
    }
  </style>
</head>

/* ─────────────────────────────────────────
   STATE  (localStorage)
───────────────────────────────────────── */
let weeks   = JSON.parse(localStorage.getItem('wt_weeks')   || '["Týden 1","Týden 2","Týden 3","Týden 4"]');
let weights = JSON.parse(localStorage.getItem('wt_weights') || '{}');
let collapsed_exercises = JSON.parse(localStorage.getItem('wt_collapsed') || '{}');
let cal_data = JSON.parse(localStorage.getItem('wt_cal_data') || '{}');
let cal_goal = parseInt(localStorage.getItem('wt_cal_goal') || '2500');
let cal_week_offset = 0; // 0 = current week, -1 = last week, etc.

function save() {
  localStorage.setItem('wt_weeks',     JSON.stringify(weeks));
  localStorage.setItem('wt_weights',   JSON.stringify(weights));
  localStorage.setItem('wt_collapsed', JSON.stringify(collapsed_exercises));
  localStorage.setItem('wt_cal_data',  JSON.stringify(cal_data));
  localStorage.setItem('wt_cal_goal',  cal_goal);
}

function toggleCard(id) {
  collapsed_exercises[id] = !collapsed_exercises[id];
  save();
  const card = document.getElementById('card-' + id);
  card.classList.toggle('collapsed', collapsed_exercises[id]);
}

/* ─────────────────────────────────────────
   NAVIGATION
───────────────────────────────────────── */
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  const order = ['denA','denB','denC','denik','kalorie'];
  document.querySelectorAll('.tab')[order.indexOf(id)].classList.add('active');
  if (id === 'denik') renderDiary();
  if (id === 'kalorie') renderKalorie();
}

/* ─────────────────────────────────────────
   KALORIE
───────────────────────────────────────── */
const DAY_NAMES = ['Neděle','Pondělí','Úterý','Středa','Čtvrtek','Pátek','Sobota'];
const DAY_SHORT = ['Ne','Po','Út','St','Čt','Pá','So'];

function isoDate(d) {
  return d.toISOString().slice(0,10);
}

function getWeekDates(offset) {
  const today = new Date();
  const dow = today.getDay(); // 0=Sun
  const monday = new Date(today);
  monday.setDate(today.getDate() - ((dow + 6) % 7) + offset * 7);
  return Array.from({length:7}, (_, i) => {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    return d;
  });
}

function getCalDay(dateStr) {
  return cal_data[dateStr] || {b:0, l:0, d:0, sm:0, sa:0, h:0};
}

function setCalMeal(dateStr, meal, val) {
  if (!cal_data[dateStr]) cal_data[dateStr] = {b:0,l:0,d:0,sm:0,sa:0,h:0};
  cal_data[dateStr][meal] = parseInt(val) || 0;
  save();
  updateKalDayCard(dateStr);
  updateKalStats();
}

function setCalGoal(val) {
  cal_goal = parseInt(val) || 2500;
  save();
  renderKalorie();
}

function updateKalDayCard(dateStr) {
  const day = getCalDay(dateStr);
  const total = day.b + day.l + day.d + day.sm + day.sa + day.h;
  const pct = cal_goal > 0 ? Math.min(total / cal_goal * 100, 100) : 0;
  const over = total > cal_goal;
  const ok = total > 0 && !over;
  const cls = over ? 'over' : ok ? 'ok' : '';

  const totalEl = document.getElementById('kal-total-' + dateStr);
  const barEl   = document.getElementById('kal-bar-'   + dateStr);
  if (totalEl) {
    totalEl.textContent = total ? total.toLocaleString() + ' kcal' : '—';
    totalEl.className = 'kal-day-total' + (cls ? ' ' + cls : '');
  }
  if (barEl) {
    barEl.style.width = pct + '%';
    barEl.className = 'kal-progress-bar' + (cls ? ' ' + cls : '');
  }
}

function updateKalStats() {
  const dates = getWeekDates(cal_week_offset).map(isoDate);
  const totals = dates.map(d => { const x=getCalDay(d); return x.b+x.l+x.d+x.sm+x.sa+x.h; });
  const tracked = totals.filter(t => t > 0);
  const avg = tracked.length ? Math.round(tracked.reduce((a,b)=>a+b,0)/tracked.length) : 0;
  const weekTotal = totals.reduce((a,b)=>a+b,0);

  const avgEl = document.getElementById('kal-stat-avg');
  const totEl = document.getElementById('kal-stat-total');
  const daysEl = document.getElementById('kal-stat-days');
  if (avgEl) avgEl.textContent = avg ? avg.toLocaleString() : '—';
  if (totEl) totEl.textContent = weekTotal ? weekTotal.toLocaleString() : '—';
  if (daysEl) daysEl.textContent = tracked.length + ' / 7';
}

function renderKalorie() {
  const container = document.getElementById('kalorie');
  const today = isoDate(new Date());
  const dates  = getWeekDates(cal_week_offset);

  const weekStart = dates[0];
  const weekEnd   = dates[6];
  const fmt = d => d.getDate() + '.' + (d.getMonth()+1) + '.';
  const weekLabel = fmt(weekStart) + ' – ' + fmt(weekEnd);

  const dayCards = dates.map(d => {
    const ds    = isoDate(d);
    const isToday = ds === today;
    const dayData = getCalDay(ds);
    const total = dayData.b + dayData.l + dayData.d + dayData.sm + dayData.sa + dayData.h;
    const pct   = cal_goal > 0 ? Math.min(total / cal_goal * 100, 100) : 0;
    const over  = total > cal_goal;
    const ok    = total > 0 && !over;
    const cls   = over ? 'over' : ok ? 'ok' : '';

    const meals = [
      {key:'b',  label:'Snídaně'},
      {key:'sm', label:'Dop. svačina'},
      {key:'l',  label:'Oběd'},
      {key:'d',  label:'Večeře'},
      {key:'sa', label:'Odp. svačina'},
      {key:'h',  label:'🍫 Hříchy'},
    ];

    const mealInputs = meals.map(m => `
      <div class="kal-meal">
        <div class="kal-meal-label">${m.label}</div>
        <input class="kal-meal-input" type="number" min="0" placeholder="0"
               value="${dayData[m.key] || ''}"
               onchange="setCalMeal('${ds}','${m.key}',this.value)">
      </div>`).join('');

    return `
      <div class="kal-day-card${isToday ? ' today' : ''}">
        <div class="kal-day-top">
          <div>
            <div class="kal-day-name">${DAY_NAMES[d.getDay()]}${isToday ? ' <span style="color:var(--accent);font-size:12px">· dnes</span>' : ''}</div>
            <div class="kal-day-date">${d.getDate()}. ${d.getMonth()+1}. ${d.getFullYear()}</div>
          </div>
          <div id="kal-total-${ds}" class="kal-day-total${cls ? ' '+cls : ''}">${total ? total.toLocaleString()+' kcal' : '—'}</div>
        </div>
        <div class="kal-progress">
          <div id="kal-bar-${ds}" class="kal-progress-bar${cls ? ' '+cls : ''}" style="width:${pct}%"></div>
        </div>
        <div class="kal-meals">${mealInputs}</div>
      </div>`;
  }).join('');

  const totals = dates.map(d => { const x=getCalDay(isoDate(d)); return x.b+x.l+x.d+x.sm+x.sa+x.h; });
  const tracked = totals.filter(t => t > 0);
  const avg = tracked.length ? Math.round(tracked.reduce((a,b)=>a+b,0)/tracked.length) : 0;
  const weekTotal = totals.reduce((a,b)=>a+b,0);

  container.innerHTML = `
    <h1 class="page-title">🔥 Kalorický deník</h1>

    <div class="kal-goal-row">
      <div class="kal-goal-label">Denní kalorický cíl</div>
      <input class="kal-goal-input" type="number" min="0" value="${cal_goal}"
             onchange="setCalGoal(this.value)">
      <span class="kal-goal-unit">kcal</span>
    </div>

    <div class="kal-header">
      <div class="kal-week-nav">
        <button onclick="cal_week_offset--;renderKalorie()">‹</button>
        <div class="kal-week-label">${weekLabel}</div>
        <button onclick="cal_week_offset++;renderKalorie()" ${cal_week_offset >= 0 ? 'disabled style="opacity:.4"' : ''}>›</button>
      </div>
    </div>

    <div class="kal-stats">
      <div class="kal-stat">
        <div id="kal-stat-avg" class="kal-stat-value">${avg ? avg.toLocaleString() : '—'}</div>
        <div class="kal-stat-label">Průměr / den</div>
      </div>
      <div class="kal-stat">
        <div id="kal-stat-total" class="kal-stat-value">${weekTotal ? weekTotal.toLocaleString() : '—'}</div>
        <div class="kal-stat-label">Celkem týden</div>
      </div>
      <div class="kal-stat">
        <div id="kal-stat-days" class="kal-stat-value">${tracked.length} / 7</div>
        <div class="kal-stat-label">Dní zaznamenáno</div>
      </div>
    </div>

    ${dayCards}`;
}

/* ─────────────────────────────────────────
   EXERCISE PAGES
───────────────────────────────────────── */
function renderImg(src, fallback, name, i) {
  return `
    <div class="img-cell">
      <div class="img-fallback">${fallback}</div>
      <img src="${src}" alt="${name} ${i+1}" loading="lazy"
           onload="this.previousElementSibling.style.display='none'"
           onerror="this.style.display='none'">
    </div>`;
}

function renderInlineWeights(ex) {
  const cells = weeks.map((w, wi) => {
    const val = getWeight(ex.id, wi);
    const cls = val !== '' ? ' has-value' : '';
    return `
      <div class="inline-week">
        <div class="inline-week-label">${w}</div>
        <input class="week-input${cls}" type="text" placeholder="—"
               value="${val}" data-ex="${ex.id}" data-wi="${wi}"
               onchange="setWeight('${ex.id}', ${wi}, this.value)">
      </div>`;
  }).join('');
  return `
    <div class="inline-weights">
      <div class="inline-weights-header">
        <span class="tips-label" style="margin:0">Váhový deník</span>
        <button class="inline-denik-link" onclick="showPage('denik')" title="Zobrazit přehled">↗ Celý přehled</button>
      </div>
      <div class="inline-weeks-row">${cells}</div>
    </div>`;
}

function renderExercise(ex) {
  const collapsed = (collapsed_exercises[ex.id] || false) ? ' collapsed' : '';
  return `
    <div class="exercise-card${collapsed}" id="card-${ex.id}">
      <div class="exercise-top">
        <span class="exercise-name">${ex.name}</span>
        <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">
          <span class="exercise-sets">${ex.sets}</span>
          <button class="collapse-btn" onclick="toggleCard('${ex.id}')" title="Skrýt/zobrazit">▼</button>
        </div>
      </div>
      <div class="exercise-body">
        <div class="img-grid">
          ${ex.imgs.map((src, i) => renderImg(src, ex.fallback, ex.name, i)).join('')}
        </div>
        <div class="tips-label">Tipy</div>
        <ul class="tips-list">
          ${ex.tips.map(t => `<li>${t}</li>`).join('')}
        </ul>
        ${renderInlineWeights(ex)}
      </div>
    </div>`;
}

function renderDay(key) {
  const day = PROGRAM[key];
  document.getElementById(key).innerHTML =
    `<h1 class="page-title">${day.emoji} ${day.title}</h1>` +
    day.exercises.map(renderExercise).join('');
}

/* ─────────────────────────────────────────
   DIARY
───────────────────────────────────────── */
function getWeight(exId, wi) {
  return (weights[exId] && weights[exId][wi] != null) ? weights[exId][wi] : '';
}

function setWeight(exId, wi, val) {
  if (!weights[exId]) weights[exId] = {};
  if (val === '') {
    delete weights[exId][wi];
  } else {
    weights[exId][wi] = val;
  }
  save();
  updateInputStyle(exId, wi);
}

function updateInputStyle(exId, wi) {
  const inp = document.querySelector(`[data-ex="${exId}"][data-wi="${wi}"]`);
  if (!inp) return;
  inp.classList.toggle('has-value', inp.value !== '');
}

function addWeek() {
  weeks.push(`Týden ${weeks.length + 1}`);
  save();
  renderDay('denA');
  renderDay('denB');
  renderDay('denC');
  renderDiary();
}

function removeWeek(wi) {
  if (weeks.length <= 1) return;
  weeks.splice(wi, 1);
  Object.keys(weights).forEach(exId => {
    const shifted = {};
    Object.keys(weights[exId]).forEach(k => {
      const ki = parseInt(k);
      if (ki < wi) shifted[ki] = weights[exId][ki];
      else if (ki > wi) shifted[ki - 1] = weights[exId][ki];
    });
    weights[exId] = shifted;
  });
  save();
  renderDay('denA');
  renderDay('denB');
  renderDay('denC');
  renderDiary();
}

function renameWeek(wi, val) {
  weeks[wi] = val || `Týden ${wi + 1}`;
  save();
  renderDay('denA');
  renderDay('denB');
  renderDay('denC');
}

function calcStats() {
  const allEx = Object.values(PROGRAM).flatMap(d => d.exercises);
  let filled = 0, total = allEx.length * weeks.length;
  allEx.forEach(ex => {
    weeks.forEach((_, wi) => { if (getWeight(ex.id, wi) !== '') filled++; });
  });
  const pct = total ? Math.round((filled / total) * 100) : 0;
  return { filled, total, pct, exercises: allEx.length };
}

function renderDiary() {
  const stats = calcStats();
  const container = document.getElementById('denik');

  const statsHtml = `
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-value">${weeks.length}</div>
        <div class="stat-label">Sledovaných týdnů</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">${stats.exercises}</div>
        <div class="stat-label">Cviků celkem</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">${stats.pct} %</div>
        <div class="stat-label">Vyplněno (${stats.filled} / ${stats.total})</div>
      </div>
    </div>`;

  const daysHtml = Object.entries(PROGRAM).map(([key, day]) => {
    const weekHeaders = weeks.map((w, wi) => `
      <th>
        <div class="week-th">
          <input value="${w}" onchange="renameWeek(${wi}, this.value)"
                 title="Klikni pro přejmenování">
          <button class="remove-week" onclick="removeWeek(${wi})" title="Odstranit týden">✕</button>
        </div>
      </th>`).join('');

    const rows = day.exercises.map(ex => {
      const cells = weeks.map((_, wi) => {
        const val = getWeight(ex.id, wi);
        const cls = val !== '' ? ' has-value' : '';
        return `<td>
          <input class="week-input${cls}" type="text" placeholder="—"
                 value="${val}" data-ex="${ex.id}" data-wi="${wi}"
                 onchange="setWeight('${ex.id}', ${wi}, this.value)">
        </td>`;
      }).join('');

      return `<tr>
        <td>
          <div class="ex-cell-name">${ex.name}</div>
          <div class="ex-cell-sets">${ex.sets}</div>
        </td>
        ${cells}
      </tr>`;
    }).join('');

    return `
      <div class="diary-day">
        <div class="diary-day-header">
          <div>
            <div class="diary-day-title">${day.emoji} ${day.title.split('–')[1].trim()}</div>
            <div class="diary-day-sub">${day.title.split('–')[0].trim()}</div>
          </div>
        </div>
        <div class="table-card">
          <div class="table-scroll">
            <table>
              <thead>
                <tr>
                  <th>Cvik</th>
                  ${weekHeaders}
                </tr>
              </thead>
              <tbody>${rows}</tbody>
            </table>
          </div>
        </div>
      </div>`;
  }).join('');

  container.innerHTML = `
    <h1 class="page-title">📊 Deník vah</h1>
    ${statsHtml}
    ${daysHtml}
    <div class="actions-bar">
      <button class="btn btn-primary" onclick="addWeek()">+ Přidat týden</button>
      <button class="btn btn-secondary" onclick="exportCSV()">⬇ Export CSV</button>
      <button class="btn btn-secondary" onclick="clearAll()">🗑 Vymazat vše</button>
    </div>`;
}

/* ─────────────────────────────────────────
   EXPORT CSV
───────────────────────────────────────── */
function exportCSV() {
  const allEx = Object.values(PROGRAM).flatMap(d => d.exercises);
  const header = ['Cvik', ...weeks].join(',');
  const rows = allEx.map(ex =>
    ['"' + ex.name + '"', ...weeks.map((_, wi) => getWeight(ex.id, wi) || '')].join(',')
  );
  const csv = [header, ...rows].join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'workout-vahy.csv';
  a.click();
}

/* ─────────────────────────────────────────
   CLEAR ALL
───────────────────────────────────────── */
function clearAll() {
  if (!confirm('Opravdu chceš smazat všechna uložená váhová maxima? Tato akce nelze vrátit.')) return;
  weights = {};
  save();
  renderDiary();
}

/* ─────────────────────────────────────────
   INIT
───────────────────────────────────────── */
renderDay('denA');
renderDay('denB');
renderDay('denC');
renderDiary();
